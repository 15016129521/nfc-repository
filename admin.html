<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f5;display:flex;height:100vh;}
        .sidebar{width:200px;background:#1a1a2e;color:#fff;padding:20px 0;}
        .sidebar h2{text-align:center;color:#f0c878;margin-bottom:20px;}
        .sidebar a{display:block;color:#bbb;padding:12px 20px;text-decoration:none;cursor:pointer;}
        .sidebar a:hover,.sidebar a.active{background:rgba(212,148,58,0.2);color:#f0c878;}
        .main{flex:1;padding:30px;overflow-y:auto;}
        .card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
        h3{margin-bottom:16px;}
        input,textarea{width:100%;padding:10px;border:1px solid #e0e0e0;border-radius:8px;margin:6px 0;font-size:14px;}
        button{background:#d4943a;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;margin:4px;}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    </style>
</head>
<body>
<div class="sidebar">
    <h2>🍺 商家中心</h2>
    <a class="active" onclick="showPage('basic')">🏪 门店信息</a >
    <a onclick="showPage('menu')">🍽️ 菜单管理</a >
    <a onclick="showPage('platforms')">📱 平台管理</a >
    <a onclick="showPage('contact')">📞 联系方式</a >
    <a onclick="showPage('wifi')">📶 WiFi设置</a >
</div>
<div class="main" id="mainContent"></div>
<script>
const STORE_ID = 'tongfeng001';
const DEFAULT_CONFIG = {
    storeName:'痛疯精酿',address:'浙江省杭州市临安区花间里',
    phone:'18258222619',wechatId:'Wjl1715514794',
    wifiSSID:'TongFeng-WiFi',wifiPassword:'88888888',
    platforms:{
        xiaohongshu:{enabled:true,name:'小红书',scheme:'xhsdiscover://post'},
        dianping:{enabled:true,name:'大众点评',scheme:'dianping://'},
        meituan:{enabled:true,name:'美团',scheme:'meituan://'},
        douyin:{enabled:true,name:'抖音',scheme:'snssdk1128://'},
        gaode:{enabled:true,name:'高德地图',scheme:'iosamap://'},
        ctrip:{enabled:true,name:'携程',scheme:'ctrip://'},
        kuaishou:{enabled:true,name:'快手',scheme:'kwai://'},
        wechat_moments:{enabled:true,name:'朋友圈',scheme:'weixin://'}
    },
    menu:[
        {name:'龙井小麦',price:38,emoji:'🍵'},
        {name:'浑浊IPA',price:48,emoji:'🍊'},
        {name:'炸鸡拼盘',price:28,emoji:'🍗'},
        {name:'品鉴套餐',price:88,emoji:'🍱'}
    ]
};

let config = JSON.parse(localStorage.getItem('storeConfig_tongfeng001')) || DEFAULT_CONFIG;

function save() {
    config.storeId = STORE_ID;
    localStorage.setItem('storeConfig_tongfeng001', JSON.stringify(config));
    localStorage.setItem('storeConfig', JSON.stringify(config));
    alert('✅ 已保存！刷新NFC页面即可看到效果');
}

function showPage(page) {
    document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
    event.target.classList.add('active');
    const main = document.getElementById('mainContent');
    if(page==='basic'){
        main.innerHTML = `<div class="card"><h3>🏪 门店信息</h3>
            <div class="grid2"><div><label>店名</label><input id="storeName" value="${config.storeName}"></div>
            <div><label>地址</label><input id="address" value="${config.address}"></div></div>
            <button onclick="config.storeName=document.getElementById('storeName').value;config.address=document.getElementById('address').value;save();">保存</button></div>`;
    }else if(page==='menu'){
        let html = '<div class="card"><h3>🍽️ 菜单</h3>';
        config.menu.forEach((m,i)=>{
            html += `<div style="display:flex;gap:12px;align-items:center;margin:8px 0;">
                <span>${m.emoji} ${m.name} ¥${m.price}</span>
                <button onclick="config.menu.splice(${i},1);save();showPage('menu');">删除</button></div>`;
        });
        html += '<button onclick="config.menu.push({name:prompt(\'名称\')||\'新品\',price:parseInt(prompt(\'价格\')||0),emoji:prompt(\'图标\')||\'🍺\'});save();showPage(\'menu\');">＋ 添加</button></div>';
        main.innerHTML = html;
    }else if(page==='platforms'){
        let html = '<div class="card"><h3>📱 平台管理</h3>';
        Object.entries(config.platforms).forEach(([k,p])=>{
            html += `<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">
                <span>${p.name}</span>
                <input value="${p.scheme}" onchange="config.platforms['${k}'].scheme=this.value;save();" style="width:200px;">
                <button onclick="config.platforms['${k}'].enabled=!config.platforms['${k}'].enabled;save();showPage('platforms');">${p.enabled?'启用':'禁用'}</button></div>`;
        });
        main.innerHTML = html+'</div>';
    }else if(page==='contact'){
        main.innerHTML = `<div class="card"><h3>📞 联系方式</h3>
            <label>电话</label><input id="phone" value="${config.phone}">
            <label>微信</label><input id="wechatId" value="${config.wechatId}">
            <button onclick="config.phone=document.getElementById('phone').value;config.wechatId=document.getElementById('wechatId').value;save();">保存</button></div>`;
    }else if(page==='wifi'){
        main.innerHTML = `<div class="card"><h3>📶 WiFi</h3>
            <label>WiFi名称</label><input id="wifiSSID" value="${config.wifiSSID}">
            <label>WiFi密码</label><input id="wifiPassword" value="${config.wifiPassword}">
            <button onclick="config.wifiSSID=document.getElementById('wifiSSID').value;config.wifiPassword=document.getElementById('wifiPassword').value;save();">保存</button></div>`;
    }
}
showPage('basic');
</script>
</body>
</html>
