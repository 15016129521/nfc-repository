<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家运营中心</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --sidebar-bg: #1a1a2e;
            --amber: #d4943a;
            --amber-light: #f0c878;
            --text: #1a1a1a;
            --muted: #888;
            --border: #e0e0e0;
            --danger: #c41e3a;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; overflow: hidden;
        }
        .sidebar {
            width: 240px; background: var(--sidebar-bg);
            display: flex; flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3); flex-shrink: 0; z-index: 10;
        }
        .sidebar-header {
            padding: 24px 16px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-header .logo { font-size: 20px; font-weight: 800; color: var(--amber-light); }
        .sidebar-header .sub { font-size: 11px; color: #667; }
        .sidebar-nav { flex:1; overflow-y:auto; padding: 12px 0; }
        .nav-section { padding: 16px 20px 8px; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 20px; font-size: 14px; color: #8899a6;
            cursor: pointer; border-left: 3px solid transparent; transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.04); color: #ddd; }
        .nav-item.active { background: rgba(212,148,58,0.12); color: var(--amber-light); border-left-color: var(--amber); font-weight:600; }
        .main { flex:1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar {
            background: #fff; padding: 16px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; justify-content: space-between; align-items: center;
        }
        .content-area { flex:1; padding: 24px; overflow-y: auto; background: var(--bg); }
        .section-card { background: #fff; border-radius: var(--radius); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow); }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input, select, textarea {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px; background: #fafafa; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--amber); background: #fff; }
        .btn {
            background: var(--amber); color: #fff; border: none;
            padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-danger { background: var(--danger); }
        .btn-outline { background: #fff; border: 1px solid var(--amber); color: var(--amber); }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-warning { background: #fff3e0; color: #e65100; }
        .stat-card {
            background: #fff; border-radius: var(--radius); padding: 20px;
            box-shadow: var(--shadow); border-left: 4px solid var(--amber);
        }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--amber); }
        .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
        .toggle { width: 44px; height: 24px; background: #ccc; border-radius: 12px; position: relative; cursor: pointer; transition: 0.2s; }
        .toggle.active { background: var(--amber); }
        .toggle::after { content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }
        .toggle.active::after { left: 22px; }
        .toast { position: fixed; top: 20px; right: 20px; background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 9999; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<!-- 密码验证 -->
<div id="authOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a2e;z-index:99999;display:flex;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:30px;text-align:center;max-width:380px;width:90%;">
        <div style="font-size:48px;margin-bottom:16px;">🔐</div>
        <h2>商家后台</h2>
        <p style="color:#888;margin:12px 0;">门店ID: tongfeng001</p>
        <input type="password" id="authPass" placeholder="请输入密码" style="width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:8px;font-size:16px;text-align:center;margin-bottom:12px;">
        <button class="btn" onclick="verifyPass()" style="width:100%;">进入</button>
        <p id="authErr" style="color:#c41e3a;margin-top:8px;display:none;">❌ 密码错误</p>
    </div>
</div>

<!-- 侧边栏 -->
<div class="sidebar" id="mainSidebar" style="display:none;">
    <div class="sidebar-header">
        <div class="logo">🍺 商家中心</div>
        <div class="sub">NFC智能拓客</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">数据</div>
        <div class="nav-item active" data-page="dashboard"><span>📊</span>数据看板</div>
        <div class="nav-item" data-page="orders"><span>📋</span>订单管理</div>
        <div class="nav-item" data-page="verify"><span>🎟️</span>优惠核销</div>
        <div class="nav-section">装修</div>
        <div class="nav-item" data-page="layout"><span>🎨</span>页面装修</div>
        <div class="nav-item" data-page="basic"><span>🏪</span>门店信息</div>
        <div class="nav-item" data-page="platforms"><span>📱</span>平台管理</div>
        <div class="nav-section">内容</div>
        <div class="nav-item" data-page="menu"><span>🍽️</span>菜单管理</div>
        <div class="nav-item" data-page="activities"><span>🎫</span>活动管理</div>
        <div class="nav-item" data-page="collect"><span>⭐</span>收藏打卡</div>
        <div class="nav-item" data-page="follow"><span>➕</span>关注矩阵</div>
        <div class="nav-item" data-page="lottery"><span>🎰</span>抽奖设置</div>
        <div class="nav-section">AI工具</div>
        <div class="nav-item" data-page="video"><span>🎬</span>AI视频</div>
        <div class="nav-item" data-page="poster"><span>🎨</span>AI海报</div>
        <div class="nav-section">发布</div>
        <div class="nav-item" data-page="auth"><span>🔗</span>账号授权</div>
        <div class="nav-item" data-page="publish"><span>📤</span>一键发布</div>
        <div class="nav-section">财务</div>
        <div class="nav-item" data-page="finance"><span>💰</span>财务中心</div>
        <div class="nav-item" data-page="renew"><span>🔄</span>续费管理</div>
        <div class="nav-item" data-page="profile"><span>👤</span>个人中心</div>
    </nav>
</div>

<!-- 主内容 -->
<div class="main" id="mainContent" style="display:none;">
    <div class="topbar">
        <span id="breadcrumb">📊 数据看板</span>
        <span style="color:var(--muted);">门店ID: tongfeng001</span>
    </div>
    <div class="content-area" id="contentArea"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ========== 密码验证 ==========
window.verifyPass = function() {
    if (document.getElementById('authPass').value === 'beer123') {
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('mainSidebar').style.display = 'flex';
        document.getElementById('mainContent').style.display = 'flex';
        initApp();
    } else {
        document.getElementById('authErr').style.display = 'block';
    }
};
document.getElementById('authPass').addEventListener('keydown', function(e) { if (e.key === 'Enter') verifyPass(); });

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

// ========== 默认数据 ==========
const DEFAULT_DATA = {
    storeName:'痛疯精酿', address:'浙江省杭州市临安区花间里',
    phone:'18258222619', wechatId:'Wjl1715514794',
    wifiSSID:'TongFeng-WiFi', wifiPassword:'88888888',
    platforms:{
        xiaohongshu:{enabled:true,name:'小红书',scheme:'xhsdiscover://post'},
        dianping:{enabled:true,name:'大众点评',scheme:'dianping://'},
        meituan:{enabled:true,name:'美团',scheme:'meituan://'},
        douyin:{enabled:true,name:'抖音',scheme:'snssdk1128://'},
        gaode:{enabled:true,name:'高德地图',scheme:'iosamap://'},
        ctrip:{enabled:true,name:'携程',scheme:'ctrip://'},
        kuaishou:{enabled:true,name:'快手',scheme:'kwai://'},
        wechat_moments:{enabled:true,name:'朋友圈',scheme:'weixin://'}
    },
    menu:[
        {name:'龙井小麦',price:38,emoji:'🍵'},
        {name:'浑浊IPA',price:48,emoji:'🍊'},
        {name:'炸鸡拼盘',price:28,emoji:'🍗'},
        {name:'品鉴套餐',price:88,emoji:'🍱'}
    ],
    activities:[
        {title:'新人体验套餐',priceCurrent:39.9,priceOriginal:88,emoji:'🍻'}
    ],
    collectPlatforms:['dianping','douyin','gaode'],
    followAccounts:[
        {platform:'douyin',accountId:'tongfengbeer',emoji:'🎵'},
        {platform:'xiaohongshu',accountId:'tongfengbeer',emoji:'📕'}
    ],
    lottery:{enabled:true,prizes:[
        {name:'精酿畅饮券',emoji:'🍺',weight:10},
        {name:'小吃拼盘',emoji:'🍟',weight:20}
    ]},
    videoUrl:'',
    layout:{themeColor:'#d4943a',bgColor:'#1a0f0a',modules:[
        {id:'header',visible:true,order:1},
        {id:'platforms',visible:true,order:2},
        {id:'collect',visible:true,order:3},
        {id:'activities',visible:true,order:4},
        {id:'contact',visible:true,order:5}
    ]}
};

// 加载数据
let D = JSON.parse(localStorage.getItem('storeConfig_tongfeng001')) || DEFAULT_DATA;
function save() {
    D.storeId = 'tongfeng001';
    localStorage.setItem('storeConfig_tongfeng001', JSON.stringify(D));
    localStorage.setItem('storeConfig', JSON.stringify(D));
    showToast('✅ 已保存');
}

// ========== 每个页面的渲染函数（每个菜单对应一个） ==========
function page_dashboard() {
    return `<div class="grid-4"><div class="stat-card"><div class="stat-value">128</div><div class="stat-label">NFC触碰</div></div><div class="stat-card"><div class="stat-value">22</div><div class="stat-label">添加微信</div></div><div class="stat-card"><div class="stat-value">5</div><div class="stat-label">总订单</div></div><div class="stat-card"><div class="stat-value">¥468</div><div class="stat-label">营收</div></div></div>`;
}

function page_orders() { return '<div class="section-card"><div class="section-title">📋 订单管理</div><p>订单功能已就绪，接入后端数据后展示真实订单。</p></div>'; }
function page_verify() {
    return `<div class="section-card"><div class="section-title">🎟️ 优惠核销</div>
    <input id="vcode" placeholder="输入核销码" style="margin-bottom:12px;">
    <button class="btn" onclick="verifyCode()">核销</button>
    <div id="vresult" style="margin-top:8px;"></div></div>`;
}
window.verifyCode = function() {
    const code = document.getElementById('vcode').value.trim().toUpperCase();
    const records = JSON.parse(localStorage.getItem('lottery_records')||'[]');
    const found = records.find(r=>r.code===code);
    const res = document.getElementById('vresult');
    if(!found) res.innerHTML='<span style="color:red;">❌ 无效核销码</span>';
    else if(found.used) res.innerHTML='<span style="color:orange;">⚠️ 已核销</span>';
    else { found.used=true; localStorage.setItem('lottery_records',JSON.stringify(records)); res.innerHTML='<span style="color:green;">✅ 核销成功</span>'; }
};

function page_layout() {
    const l = D.layout || DEFAULT_DATA.layout;
    const names = {header:'品牌头部',platforms:'好评入口',collect:'收藏打卡',activities:'限时活动',contact:'联系商家'};
    let html = `<div class="section-card"><div class="section-title">🎨 页面视觉</div>
    <div class="grid-2"><div class="form-group"><label>主题色</label><input type="color" id="themeColor" value="${l.themeColor||'#d4943a'}" style="height:44px;"></div>
    <div class="form-group"><label>背景色</label><input type="color" id="bgColor" value="${l.bgColor||'#1a0f0a'}" style="height:44px;"></div></div></div>
    <div class="section-card"><div class="section-title">📐 模块布局</div>`;
    (l.modules||[]).forEach(m => {
        html += `<div style="display:flex;align-items:center;gap:12px;padding:12px;background:#fafafa;border-radius:8px;margin-bottom:8px;">
        <span>⋮⋮</span><span style="flex:1;">${names[m.id]||m.id}</span>
        <input type="number" value="${m.order||1}" min="1" max="20" style="width:60px;" onchange="D.layout.modules.find(x=>x.id==='${m.id}').order=parseInt(this.value)||1">
        <div class="toggle ${m.visible!==false?'active':''}" onclick="D.layout.modules.find(x=>x.id==='${m.id}').visible=!this.classList.toggle('active')"></div></div>`;
    });
    html += `<button class="btn" onclick="D.layout.themeColor=document.getElementById('themeColor').value;D.layout.bgColor=document.getElementById('bgColor').value;save();showToast('页面装修已保存');">💾 保存</button></div>`;
    return html;
}

function page_basic() {
    return `<div class="section-card"><div class="section-title">🏪 门店信息</div>
    <div class="grid-2"><div class="form-group"><label>店名</label><input id="storeName" value="${D.storeName}"></div>
    <div class="form-group"><label>电话</label><input id="phone" value="${D.phone}"></div>
    <div class="form-group"><label>微信</label><input id="wechatId" value="${D.wechatId}"></div>
    <div class="form-group"><label>WiFi名</label><input id="wifiSSID" value="${D.wifiSSID}"></div>
    <div class="form-group"><label>WiFi密码</label><input id="wifiPassword" value="${D.wifiPassword}"></div></div>
    <div class="form-group"><label>地址</label><textarea id="address">${D.address}</textarea></div>
    <button class="btn" onclick="saveBasic()">💾 保存</button></div>`;
}
window.saveBasic = function() { D.storeName=document.getElementById('storeName').value; D.phone=document.getElementById('phone').value; D.wechatId=document.getElementById('wechatId').value; D.wifiSSID=document.getElementById('wifiSSID').value; D.wifiPassword=document.getElementById('wifiPassword').value; D.address=document.getElementById('address').value; save(); };

function page_platforms() {
    let html = '<div class="section-card"><div class="section-title">📱 平台管理</div>';
    Object.entries(D.platforms).forEach(([k,p])=>{
        html += `<div class="toggle-row"><span>${p.name}</span>
        <input value="${p.scheme}" onchange="D.platforms['${k}'].scheme=this.value;save();" style="width:200px;">
        <div class="toggle ${p.enabled?'active':''}" onclick="D.platforms['${k}'].enabled=!this.classList.toggle('active');save();"></div></div>`;
    });
    return html+'</div>';
}

function page_menu() {
    let html = '<div class="section-card"><div class="section-title">🍽️ 菜单管理 <button class="btn btn-sm" onclick="addMenu()">＋ 添加</button></div>';
    D.menu.forEach((m,i)=>{
        html += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;">${m.emoji} ${m.name} ¥${m.price} <span><button class="btn btn-sm" onclick="editMenu(${i})">✏️</button> <button class="btn btn-sm btn-danger" onclick="D.menu.splice(${i},1);save();renderPage('menu');">🗑</button></span></div>`;
    });
    return html+'</div>';
}
window.addMenu = function() { D.menu.push({name:prompt('名称')||'新品',price:parseInt(prompt('价格')||0),emoji:prompt('图标')||'🍺'}); save(); renderPage('menu'); };
window.editMenu = function(i) { const m=D.menu[i]; m.name=prompt('名称',m.name)||m.name; m.price=parseInt(prompt('价格',m.price))||0; m.emoji=prompt('图标',m.emoji)||'🍺'; save(); renderPage('menu'); };

function page_activities() {
    let html = '<div class="section-card"><div class="section-title">🎫 活动管理 <button class="btn btn-sm" onclick="addAct()">＋ 添加</button></div>';
    D.activities.forEach((a,i)=>{
        html += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;">${a.emoji} ${a.title} ¥${a.priceCurrent} <s>¥${a.priceOriginal}</s> <span><button class="btn btn-sm" onclick="editAct(${i})">✏️</button> <button class="btn btn-sm btn-danger" onclick="D.activities.splice(${i},1);save();renderPage('activities');">🗑</button></span></div>`;
    });
    return html+'</div>';
}
window.addAct = function() { D.activities.push({title:prompt('标题')||'新活动',priceCurrent:parseFloat(prompt('现价')||0),priceOriginal:parseFloat(prompt('原价')||0),emoji:prompt('图标')||'🎉'}); save(); renderPage('activities'); };
window.editAct = function(i) { const a=D.activities[i]; a.title=prompt('标题',a.title)||a.title; a.priceCurrent=parseFloat(prompt('现价',a.priceCurrent))||0; a.priceOriginal=parseFloat(prompt('原价',a.priceOriginal))||0; save(); renderPage('activities'); };

function page_collect() {
    const all=['dianping','douyin','gaode','xiaohongshu','kuaishou'];
    const names={dianping:'大众点评',douyin:'抖音',gaode:'高德',xiaohongshu:'小红书',kuaishou:'快手'};
    return `<div class="section-card"><div class="section-title">⭐ 收藏打卡</div>${all.map(k=>`<div class="toggle-row"><span>${names[k]}</span><div class="toggle ${D.collectPlatforms.includes(k)?'active':''}" onclick="if(this.classList.toggle('active')){D.collectPlatforms.push('${k}')}else{const i=D.collectPlatforms.indexOf('${k}');if(i>-1)D.collectPlatforms.splice(i,1)}save();"></div></div>`).join('')}</div>`;
}

function page_follow() {
    let html = '<div class="section-card"><div class="section-title">➕ 关注矩阵 <button class="btn btn-sm" onclick="addFollow()">＋ 添加</button></div>';
    D.followAccounts.forEach((a,i)=>{
        html += `<div style="display:flex;justify-content:space-between;padding:8px 0;">${a.emoji} ${a.platform} - ${a.accountId} <button class="btn btn-sm btn-danger" onclick="D.followAccounts.splice(${i},1);save();renderPage('follow');">删除</button></div>`;
    });
    return html+'</div>';
}
window.addFollow = function() { const p=prompt('平台(douyin/xiaohongshu/kuaishou/wechat)'); if(!p)return; D.followAccounts.push({platform:p,accountId:prompt('账号ID')||'',emoji:prompt('图标')||'📱'}); save(); renderPage('follow'); };

function page_lottery() {
    let html = `<div class="section-card"><div class="section-title">🎰 抽奖设置</div>
    <div class="toggle-row"><span>启用抽奖</span><div class="toggle ${D.lottery.enabled?'active':''}" onclick="D.lottery.enabled=!this.classList.toggle('active');save();"></div></div>`;
    D.lottery.prizes.forEach((p,i)=>{
        html += `<div style="display:flex;justify-content:space-between;padding:8px 0;">${p.emoji} ${p.name} (权重:${p.weight}) <button class="btn btn-sm" onclick="editPrize(${i})">✏️</button></div>`;
    });
    html += `<button class="btn btn-sm" onclick="D.lottery.prizes.push({name:'新奖品',emoji:'🎁',weight:10});save();renderPage('lottery');">＋ 添加奖品</button>`;
    return html;
}
window.editPrize = function(i) { const p=D.lottery.prizes[i]; p.name=prompt('名称',p.name)||p.name; p.weight=parseInt(prompt('权重',p.weight))||10; save(); renderPage('lottery'); };

function page_video() { return `<div class="section-card"><div class="section-title">🎬 AI视频</div><input id="videoUrl" value="${D.videoUrl||''}" placeholder="视频URL"><button class="btn" onclick="D.videoUrl=document.getElementById('videoUrl').value;save();showToast('已保存');" style="margin-top:12px;">保存</button></div>`; }
function page_poster() { return `<div class="section-card"><div class="section-title">🎨 AI海报</div><p>选择模板并输入信息，AI生成营销海报（需对接即梦API）。</p><button class="btn" onclick="showToast('演示：海报已生成')">生成海报</button></div>`; }
function page_auth() { return `<div class="section-card"><div class="section-title">🔗 账号授权</div><p>授权抖音/小红书/快手/美团账号后可一键发布内容。</p><button class="btn" onclick="showToast('授权成功(演示)')">一键授权</button></div>`; }
function page_publish() { return `<div class="section-card"><div class="section-title">📤 一键发布</div><p>选择已生成的视频/海报，一键分发到已授权平台。</p><button class="btn" onclick="showToast('发布成功(演示)')">🚀 发布</button></div>`; }
function page_finance() { return `<div class="section-card"><div class="section-title">💰 财务中心</div><p>营收统计：本月 ¥1,280 | 累计 ¥12,680</p></div>`; }
function page_renew() { return `<div class="section-card"><div class="section-title">🔄 续费管理</div><p>当前套餐：专业版 | 到期：2026-12-31</p><button class="btn" onclick="showToast('续费成功(演示)')">续费一年 ¥2999</button></div>`; }
function page_profile() { return `<div class="section-card"><div class="section-title">👤 个人中心</div><p>门店ID: tongfeng001</p><p>所有配置自动保存，NFC页面实时更新。</p></div>`; }

// ========== 页面路由（每个菜单名 → 渲染函数） ==========
const router = {
    dashboard: page_dashboard,
    orders: page_orders,
    verify: page_verify,
    layout: page_layout,
    basic: page_basic,
    platforms: page_platforms,
    menu: page_menu,
    activities: page_activities,
    collect: page_collect,
    follow: page_follow,
    lottery: page_lottery,
    video: page_video,
    poster: page_poster,
    auth: page_auth,
    publish: page_publish,
    finance: page_finance,
    renew: page_renew,
    profile: page_profile
};

function renderPage(name) {
    document.getElementById('contentArea').innerHTML = (router[name] || page_dashboard)();
}

// ========== 初始化 ==========
function initApp() {
    renderPage('dashboard');
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            const page = this.dataset.page;
            document.getElementById('breadcrumb').textContent = '📊 ' + this.textContent.trim();
            renderPage(page);
        });
    });
}
</script>
</body>
</html>
