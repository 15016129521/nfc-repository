<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级管理后台 · 平台运营中心</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --sidebar-bg: #0f1419;
            --amber: #d4943a;
            --amber-light: #f0c878;
            --text: #1a1a1a;
            --muted: #888;
            --card: #fff;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; overflow:hidden; }
        .sidebar { width:260px; background:var(--sidebar-bg); display:flex; flex-direction:column; box-shadow:2px 0 12px rgba(0,0,0,0.3); }
        .sidebar-header { padding:24px 16px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.08); }
        .sidebar-header .logo { font-size:20px; font-weight:800; color:var(--amber-light); }
        .sidebar-header .sub { font-size:11px; color:#667; }
        .sidebar-nav { flex:1; overflow-y:auto; padding:12px 0; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:12px 20px; font-size:14px; color:#8899a6; cursor:pointer; border-left:3px solid transparent; }
        .nav-item:hover { background:rgba(255,255,255,0.04); color:#ddd; }
        .nav-item.active { background:rgba(212,148,58,0.12); color:var(--amber-light); border-left-color:var(--amber); font-weight:600; }
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .topbar { background:#fff; padding:16px 24px; box-shadow:0 2px 8px rgba(0,0,0,0.04); display:flex; justify-content:space-between; }
        .content-area { flex:1; padding:24px; overflow-y:auto; }
        .section-card { background:#fff; border-radius:var(--radius); padding:24px; margin-bottom:24px; box-shadow:var(--shadow); }
        .section-title { font-size:18px; font-weight:700; margin-bottom:20px; }
        .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:24px; }
        .stat-card { background:#fff; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); border-left:4px solid var(--amber); }
        .stat-value { font-size:28px; font-weight:800; color:var(--amber); }
        .stat-label { font-size:12px; color:var(--muted); }
        .btn { background:var(--amber); color:#fff; border:none; padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
        .table { width:100%; border-collapse:collapse; }
        .table th,.table td { padding:12px 16px; border-bottom:1px solid #f0f0f0; }
        .table th { background:#fafafa; }
        .toast { position:fixed; top:20px; right:20px; background:#333; color:#fff; padding:12px 24px; border-radius:8px; z-index:9999; opacity:0; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>

<!-- ========== 密码验证层 ========== -->
<div id="authOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0f1419;z-index:99999;display:flex;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:30px;text-align:center;max-width:380px;width:90%;">
        <div style="font-size:48px;">👑</div>
        <h2>超级管理后台</h2>
        <p style="color:#888;margin:12px 0;">请输入超级管理员密码</p>
        <input type="password" id="authPass" placeholder="密码" style="width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:8px;font-size:16px;text-align:center;">
        <button class="btn" onclick="verifySuper()" style="width:100%;margin-top:12px;">进入</button>
        <p id="authErr" style="color:#c41e3a;margin-top:8px;display:none;">密码错误</p>
    </div>
</div>

<!-- ========== 主内容 ========== -->
<div class="sidebar" id="mainSidebar" style="display:none;">
    <div class="sidebar-header"><div class="logo">⚡ 超级后台</div><div class="sub">NFC拓客平台</div></div>
    <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard"><span>📊</span>全局看板</div>
        <div class="nav-item" data-page="stores"><span>🏪</span>全部门店</div>
        <div class="nav-item" data-page="agents"><span>👥</span>代理管理</div>
        <div class="nav-item" data-page="system"><span>⚙️</span>系统配置</div>
    </nav>
</div>
<div class="main" id="mainContent" style="display:none;">
    <div class="topbar"><div class="breadcrumb" id="breadcrumb">📊 全局看板</div><span>👑 超级管理员</span></div>
    <div class="content-area" id="contentArea"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPER_PASSWORD = 'super123';
const AUTH_KEY = 'super_auth';

const authData = JSON.parse(localStorage.getItem(AUTH_KEY) || '{}');
if (authData.authenticated && (Date.now() - authData.time < 86400000)) {
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('mainSidebar').style.display = 'flex';
    document.getElementById('mainContent').style.display = 'flex';
    initSuper();
}

window.verifySuper = function() {
    if (document.getElementById('authPass').value === SUPER_PASSWORD) {
        localStorage.setItem(AUTH_KEY, JSON.stringify({ authenticated: true, time: Date.now() }));
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('mainSidebar').style.display = 'flex';
        document.getElementById('mainContent').style.display = 'flex';
        initSuper();
    } else {
        document.getElementById('authErr').style.display = 'block';
    }
};

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

function getAllStoreConfigs() {
    const configs = [];
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('storeConfig_')) {
            try { const cfg = JSON.parse(localStorage.getItem(key)); if (cfg && cfg.storeId) configs.push(cfg); } catch(e) {}
        }
    }
    return configs;
}

function initSuper() {
    document.getElementById('contentArea').innerHTML = renderDashboard();
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('breadcrumb').textContent = this.textContent.trim();
            document.getElementById('contentArea').innerHTML = pageRenderers[this.dataset.page]();
        });
    });
}

const pageRenderers = {
    dashboard: ()=>{
        const configs = getAllStoreConfigs();
        return `<div class="grid-4" style="margin-bottom:24px;"><div class="stat-card"><div class="stat-value">${configs.length}</div><div class="stat-label">门店总数</div></div></div><div class="section-card"><div class="section-title">📈 门店列表</div><table class="table"><thead><tr><th>ID</th><th>名称</th><th>操作</th></tr></thead><tbody>${configs.map(c=>`<tr><td>${c.storeId}</td><td>${c.storeName}</td><td><a href="store.html?id=${c.storeId}" target="_blank">预览</a> | <a href="admin.html?id=${c.storeId}" target="_blank">后台</a></td></tr>`).join('')}</tbody></table></div>`;
    },
    stores: ()=>{
        const configs = getAllStoreConfigs();
        return `<div class="section-card"><div class="section-title">🏪 全部门店</div><table class="table"><thead><tr><th>ID</th><th>名称</th><th>操作</th></tr></thead><tbody>${configs.map(c=>`<tr><td>${c.storeId}</td><td>${c.storeName}</td><td><a href="admin.html?id=${c.storeId}" target="_blank">进入后台</a></td></tr>`).join('')}</tbody></table></div>`;
    },
    agents: ()=>`<div class="section-card"><div class="section-title">👥 代理管理</div><p>查看所有代理数据（演示）</p></div>`,
    system: ()=>`<div class="section-card"><div class="section-title">⚙️ 系统配置</div><p>全局参数设置（演示）</p></div>`
};
</script>
</body>
</html>
